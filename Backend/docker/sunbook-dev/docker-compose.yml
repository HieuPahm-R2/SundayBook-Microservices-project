services:
  eurekaserver:
    image: "sunbook/salon-eurekaserver:v1"
    ports:
      - "8070:8070"
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent localhost:8070/actuator/health/readiness | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    container_name: eurekaserver
    #    environment:
    #      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8071/"
    #    depends_on:
    #      configserver:
    #        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - sunbook
networks:
  sunbook:
    driver: "bridge"
